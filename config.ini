[Simulation]
iterations = 10000
dt = 1E-3

[Error]
error = 0.0

[Rates]
num_rates = 20
rates = 2000.000, 1000.000, 500.000, 333.333, 250.000, 200.000, 166.667, 142.857, 125.000, 111.111, 100.000, 90.909, 83.333, 76.923, 71.429, 66.667, 62.500, 58.824, 55.556, 52.632, 50.000

