[Help]
; This config file contains all parameters for the Vocabs2 drone simulator
; Parameters can be overridden via command line arguments
; 
; [Simulation] section:
; iterations = number of simulation iterations
; dt = time step in seconds
; 
; [Error] section:
; error = positional error in meters
; 
; [Rates] section:
; num_rates = number of different rates to test
; rates = comma-separated list of rates in Hz
; 
; [Threads] section:
; num_threads = number of OpenMP threads to use
; 
; [Speed] section:
; speed = drone speed in meters per second
; 
; [Drones] section:
; num_drones = number of drones in simulation
; 
; [System] section:
; prob = system type: A=No loss, E=Wi-Fi, C=ADS-B
; loss = loss probability (0.0 to 1.0, but stored as 1000x actual value)
; 
; [Communication] section:
; Ptx = transmit power (0.0 to 1.0)
; Prx = receive power (0.0 to 1.0)
; Pint = interference probability (0.0 to 1.0)